<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>CHILDBOOK</title>
	</head>
	<body>
		<img
			src="../images/pic_1.jpeg"
			alt=""
			class=""
			width="100"
			height="100"
			loading="lazy"
		/>
		<!-- простое изображение которое хорошо без потери качества и оптимальное сжатие для jpeg, PNG значительно больше по размеру   -->

		<br />
		<img
			src="../images/pic_2.jpeg"
			alt=""
			class=""
			width="100"
			height="100"~
			loading="lazy"
		/>
		<!-- аналогично с первый -->
		<br />
		<img
			src="../images/pic_3.gif"
			alt=""
			class=""
			width="100"
			height="100"
			loading="lazy"
		/>
		<!-- можно поставить jpeg, но у GIF хорошо справляется с простым изображение и нет артефактов, так что используем что бы был наименьший размер, но я бы предпочел jpeg -->

		<!-- можно взять -->
		<!-- формат png самый лучший для исходника, использовать можно но весит много легко играться с ним
    gif хороший для простых картинок и легким градиентом но для сложных лучше выбрать jpeg под качество где-то 90-80 
    для лого хорошо подойдет png,для всего остального jpg, gif в 95% бесполезен, только если надо ужаться в размере и потере качества-->

		<!-- PNG сохраняет резкость линий без артефактов сжатия, хорошая возможность для прозрачности. Но самый большой вес -->
		<!-- JPG Самый маленький вес файла для фото. Поддерживается абсолютно везде + можно настроить степень сжатия (оптимально использовать 80-90%) 
    Если есть текст или четкие линии то будут артефакты. только 2 уровня прозрачности, спасибо что есть, но не используется-->
		<!-- GIF очень простая графика, желательно в одном цветовом спектре (ограничение в 256 цветов),плохо работает с полупрозрачностью  -->
	</body>
</html>
